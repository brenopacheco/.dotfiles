# key used for signing
default-key 590544F30649C13CD37B38311AD6E803AEBC3C5A

# always add self as recipient
default-recipient-self

# mailing thing
no-escape-from-lines

# encoding
charset utf-8

# keyservers and configs
# keyserver hkp://keys.gnupg.net no-include-revoked verbose

# armor in ASCII chars by default
# armor

# automatically retrieve key when writting to user@email not in keyring
#auto-key-locate cert pka ldap hkp://keys.gnupg.net

# using -r mynames expand to all names/keys
#group mynames = paige 0x12345678 joe patti
